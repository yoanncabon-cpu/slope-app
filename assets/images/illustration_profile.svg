  <polygon points="92,210 104,202 104,170 92,178" fill="#4F46E5"/>
  <polygon points="60,210 92,210 92,178 60,178" fill="#818CF8"/>

  <polygon points="112,210 144,210 156,202 124,202" fill="#5EEAF7"/>
  <polygon points="144,210 156,202 156,150 144,158" fill="#047A91"/>
  <polygon points="112,210 144,210 144,158 112,158" fill="#06B6D4"/>

  <polygon points="164,210 196,210 208,202 176,202" fill="#FCD34D"/>
  <polygon points="196,210 208,202 208,130 196,138" fill="#B45309"/>
  <polygon points="164,210 196,210 196,138 164,138" fill="#F59E0B"/>

  <!-- Étincelles -->
  <circle cx="400" cy="180" r="6" fill="#F59E0B" opacity="0.5"/>
  <circle cx="420" cy="50" r="5" fill="#06B6D4" opacity="0.5"/>
