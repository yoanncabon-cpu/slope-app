<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260">
  <!-- Sol -->
  <ellipse cx="240" cy="232" rx="190" ry="18" fill="#4338CA" opacity="0.10"/>

  <!-- Trophée -->
  <g>
    <!-- Anses -->
    <path d="M120,70 C95,70 95,108 124,112" stroke="#F59E0B" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M196,70 C221,70 221,108 192,112" stroke="#F59E0B" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Coupe -->
    <polygon points="112,64 204,64 190,124 126,124" fill="#FCD34D"/>
    <polygon points="112,64 204,64 204,76 112,76" fill="#FFFBEB" opacity="0.7"/>
    <!-- Pied -->
